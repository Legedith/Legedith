name: Refresh profile insight carousel

on:
  push:
    paths:
      - "data/insights.json"
      - "scripts/render_carousel.py"
      - ".github/workflows/update-carousel.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render carousel and source index
        run: python scripts/render_carousel.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/field-notes-carousel.svg FIELD_NOTES.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh profile insight carousel"
          git push
