<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc"><title id="title">Rotating insights about LLM, agent, and robot behaviour</title><desc id="desc">A daily-changing animated carousel about artificial behaviour.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#050816"/><stop offset="0.5" stop-color="#0b1026"/><stop offset="1" stop-color="#160b2d"/></linearGradient><linearGradient id="neon" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="0.52" stop-color="#8b5cf6"/><stop offset="1" stop-color="#f472b6"/></linearGradient><radialGradient id="orb" cx="50%" cy="50%" r="65%"><stop offset="0" stop-color="#8b5cf6" stop-opacity=".22"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#64748b" stroke-opacity=".09"/></pattern><filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="340" rx="26" fill="url(#bg)"/><rect width="1200" height="340" rx="26" fill="url(#grid)"/><circle cx="180" cy="170" r="230" fill="url(#orb)"/><circle cx="1060" cy="140" r="180" fill="url(#orb)" opacity=".55"/><rect x="38" y="34" width="1124" height="260" rx="25" fill="#050a19" stroke="#334155" stroke-width="2"/><rect x="39" y="35" width="1122" height="258" rx="24" fill="none" stroke="url(#neon)" stroke-opacity=".35"/><path d="M326 56V272" stroke="#334155" stroke-opacity=".72"/><g opacity="1"><animate attributeName="opacity" values="1;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="0s" repeatCount="indefinite"/><g transform="translate(55 58)"><path d="M112 22l75 28v55c0 46-30 71-75 90-45-19-75-44-75-90V50z" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/><rect x="76" y="70" width="72" height="62" rx="16" fill="#071326" stroke="#8b5cf6" stroke-width="3"/><rect x="91" y="86" width="13" height="31" rx="6" fill="#f472b6"/><rect x="120" y="86" width="13" height="31" rx="6" fill="#f472b6"/><path d="M67 151h90" stroke="#64748b" stroke-width="5" stroke-dasharray="8 7"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Content and instruction</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">are not cleanly separated.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Role labels and untrusted text can redirect</text><text x="372" y="245" fill="#94a3b8" font-size="16">a tool-using model.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="7s" repeatCount="indefinite"/><g transform="translate(55 58)"><rect x="30" y="28" width="164" height="154" rx="24" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/><rect x="65" y="60" width="94" height="75" rx="18" fill="#071326" stroke="#22d3ee" stroke-width="3"/><circle cx="90" cy="94" r="8" fill="#f472b6"/><circle cx="134" cy="94" r="8" fill="#f472b6"/><path d="M88 118h48" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/><path d="M48 55h-20M48 88h-20M48 121h-20M176 55h20M176 88h20M176 121h20" stroke="#64748b" stroke-width="5" stroke-linecap="round"/><circle cx="28" cy="55" r="7" fill="#22d3ee"/><circle cx="28" cy="88" r="7" fill="#8b5cf6"/><circle cx="28" cy="121" r="7" fill="#f472b6"/><circle cx="196" cy="55" r="7" fill="#f472b6"/><circle cx="196" cy="88" r="7" fill="#22d3ee"/><circle cx="196" cy="121" r="7" fill="#8b5cf6"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Same instructions.</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">Different habits.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Identical skill files can shape models</text><text x="372" y="245" fill="#94a3b8" font-size="16">in very different ways.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="14s" repeatCount="indefinite"/><g transform="translate(55 58)"><rect x="32" y="37" width="160" height="132" rx="20" fill="#0f172a" stroke="#f472b6" stroke-width="3"/><path d="M57 67h100M57 98h76M57 129h110" stroke="#64748b" stroke-width="6"/><ellipse cx="139" cy="98" rx="31" ry="25" fill="#071326" stroke="#22d3ee" stroke-width="3"/><path d="M139 74v48M117 87h44M119 111h40" stroke="#22d3ee" stroke-width="4"/><path d="M111 67l-14-15M168 67l14-15M111 129l-14 15M168 129l14 15" stroke="#8b5cf6" stroke-width="4"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Benchmarks can measure</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">their own bugs.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Audit prompts, tests, contamination, and scoring</text><text x="372" y="245" fill="#94a3b8" font-size="16">before trusting a leaderboard.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="21s" repeatCount="indefinite"/><g transform="translate(55 58)"><path d="M64 63c0-24 29-31 46-12 17-19 46-12 46 12 0 34-46 62-46 62S64 97 64 63z" fill="#2a0d2a" stroke="#f472b6" stroke-width="3"/><path d="M44 160h132M110 125v35" stroke="#64748b" stroke-width="5"/><circle cx="61" cy="160" r="24" fill="#071326" stroke="#22d3ee" stroke-width="3"/><path d="M50 160h22M61 149v22" stroke="#22d3ee" stroke-width="5"/><circle cx="159" cy="160" r="24" fill="#071326" stroke="#8b5cf6" stroke-width="3"/><path d="M147 160h24" stroke="#8b5cf6" stroke-width="5"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Human-like cues change trust</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">before competence.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Personality can move feelings more than</text><text x="372" y="245" fill="#94a3b8" font-size="16">it changes task delegation.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="28s" repeatCount="indefinite"/><g transform="translate(55 58)"><path d="M34 54c0-27 22-49 49-49 19 0 35 10 43 25 8-15 24-25 43-25 27 0 49 22 49 49 0 43-47 76-92 111C81 130 34 97 34 54z" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/><path d="M72 59h32l13-24 19 57 14-33h31" stroke="#22d3ee" stroke-width="6" fill="none"/><path d="M55 171h145" stroke="#64748b" stroke-width="4" stroke-dasharray="9 8"/><circle cx="62" cy="171" r="7" fill="#f472b6"><animate attributeName="cx" values="62;193;62" dur="4.5s" repeatCount="indefinite"/></circle></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">An agent without readable history</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">has amnesia.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Searchable files and traces let earlier work compound.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="35s" repeatCount="indefinite"/><g transform="translate(55 58)"><circle cx="112" cy="105" r="72" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/><circle cx="112" cy="105" r="40" fill="#071326" stroke="#8b5cf6" stroke-width="3"/><path d="M112 45a60 60 0 0 1 54 34M168 78l-4-22 21 8" fill="none" stroke="#f472b6" stroke-width="6"/><path d="M112 165a60 60 0 0 1-54-34M56 132l4 22-21-8" fill="none" stroke="#22d3ee" stroke-width="6"/><circle cx="112" cy="105" r="10" fill="#f8fafc"/><circle cx="112" cy="45" r="8" fill="#22d3ee"/><circle cx="168" cy="135" r="8" fill="#f472b6"/><circle cx="56" cy="135" r="8" fill="#8b5cf6"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">An agent is a loop with tools—</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">not a personality.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Judge what it can observe, change, retry, and stop.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="42s" repeatCount="indefinite"/><g transform="translate(55 58)"><path d="M30 162c36-84 75-112 116-75 20 18 31 13 56-35" fill="none" stroke="#22d3ee" stroke-width="9" stroke-linecap="round"/><path d="M30 162c28-10 39-70 70-31s50-22 102-79" fill="none" stroke="#64748b" stroke-width="5" stroke-dasharray="7 8"/><circle cx="30" cy="162" r="9" fill="#f472b6"/><circle cx="202" cy="52" r="10" fill="#8b5cf6"/><path d="M181 47l21 5-7 20" fill="none" stroke="#8b5cf6" stroke-width="6"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">High-level control can beat</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">direct control.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">A competent policy plus supervision may outperform</text><text x="372" y="245" fill="#94a3b8" font-size="16">raw motor commands.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="49s" repeatCount="indefinite"/><g transform="translate(55 58)"><circle cx="108" cy="103" r="76" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/><path d="M32 103h152M108 27c-28 25-42 50-42 76s14 51 42 76M108 27c28 25 42 50 42 76s-14 51-42 76M49 62h118M49 144h118" fill="none" stroke="#22d3ee" stroke-width="2"/><text x="108" y="112" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace, monospace" font-size="23" font-weight="800">A / अ / 文</text></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">A conversation has</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">a language policy.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Models differ on whether they follow the latest query</text><text x="372" y="245" fill="#94a3b8" font-size="16">or stay anchored to prior turns.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="56s" repeatCount="indefinite"/><g transform="translate(55 58)"><circle cx="78" cy="78" r="35" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/><path d="M39 168c5-42 25-63 39-63s34 21 39 63" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/><path d="M125 152l22-28 22 13 28-50" fill="none" stroke="#f472b6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><path d="M184 88l14-2-3 14" fill="none" stroke="#f472b6" stroke-width="6"/><circle cx="78" cy="76" r="7" fill="#8b5cf6"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Expertise still compounds</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">when agents do the work.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Domain knowledge improves planning;</text><text x="372" y="245" fill="#94a3b8" font-size="16">agents amplify execution.</text></g></g><g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.006429;0.091429;0.100000;1" dur="70s" begin="63s" repeatCount="indefinite"/><g transform="translate(55 58)"><rect x="35" y="35" width="154" height="142" rx="22" fill="#0f172a" stroke="#f472b6" stroke-width="3"/><path d="M63 70h98M63 105h98M63 140h98" stroke="#64748b" stroke-width="5"/><circle cx="91" cy="70" r="11" fill="#22d3ee"/><circle cx="145" cy="105" r="11" fill="#8b5cf6"/><circle cx="112" cy="140" r="11" fill="#f472b6"/><path d="M189 69h23M189 104h23M189 139h23" stroke="#22d3ee" stroke-width="4"/></g><g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"><text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Training one virtue can grow</text><text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">another vice.</text><text x="372" y="218" fill="#cbd5e1" font-size="18">Value tuning may improve safety while increasing</text><text x="372" y="245" fill="#94a3b8" font-size="16">sycophancy or anthropomorphic language.</text></g></g><rect x="48" y="313" width="1104" height="3" rx="1.5" fill="#1e293b"/><rect x="48" y="313" width="0" height="3" rx="1.5" fill="url(#neon)" filter="url(#glow)"><animate attributeName="width" values="0;1104" dur="70s" repeatCount="indefinite"/></rect><rect x="1" y="1" width="1198" height="338" rx="25" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="2"/></svg>