<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Rotating insights about LLM and agent behaviour</title>
  <desc id="desc">Animated slides about tools, memory, instructions, interfaces, verification, and learning from failure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#160b2d"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".22"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#64748b" stroke-opacity=".09"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="26" fill="url(#grid)"/>
  <circle cx="180" cy="170" r="230" fill="url(#orb)"/>
  <circle cx="1060" cy="140" r="180" fill="url(#orb)" opacity=".55"/>
  <rect x="38" y="34" width="1124" height="260" rx="25" fill="#050a19" stroke="#334155" stroke-width="2"/>
  <rect x="39" y="35" width="1122" height="258" rx="24" fill="none" stroke="url(#neon)" stroke-opacity=".35"/>
  <path d="M326 56V272" stroke="#334155" stroke-opacity=".72"/>

  <!-- Tools -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="0s" repeatCount="indefinite"/>
    <g transform="translate(84 78)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="12" width="184" height="150" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
      <path d="M45 52h110M45 85h75M45 118h92" stroke="#64748b" stroke-width="8"/>
      <path d="M151 103l36 36M169 121l25-25" stroke="#f472b6" stroke-width="8"/>
      <circle cx="169" cy="121" r="42" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="9 8">
        <animateTransform attributeName="transform" type="rotate" from="0 169 121" to="360 169 121" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Agents need actions,</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">not just information.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Functions and tools often beat tables when the task is to do something.</text>
    </g>
  </g>

  <!-- Logs -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="8s" repeatCount="indefinite"/>
    <g transform="translate(88 76)" font-family="ui-monospace, monospace">
      <rect x="0" y="0" width="194" height="174" rx="22" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/>
      <text x="24" y="45" fill="#64748b" font-size="17">SHOULD</text>
      <path d="M24 61h142" stroke="#64748b" stroke-width="5"/>
      <text x="24" y="104" fill="#22d3ee" font-size="17">DID</text>
      <path d="M24 121h84M24 145h132" stroke="#22d3ee" stroke-width="6"/>
      <circle cx="158" cy="119" r="10" fill="#f472b6" filter="url(#glow)">
        <animate attributeName="opacity" values=".35;1;.35" dur="1.7s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Logs show behaviour.</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">Docs show intention.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Give agents traces of what actually happened—not only the official story.</text>
    </g>
  </g>

  <!-- Memory -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="16s" repeatCount="indefinite"/>
    <g transform="translate(84 78)" fill="none" stroke-linecap="round">
      <path d="M34 54c0-27 22-49 49-49 19 0 35 10 43 25 8-15 24-25 43-25 27 0 49 22 49 49 0 43-47 76-92 111C81 130 34 97 34 54z" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/>
      <path d="M72 59h32l13-24 19 57 14-33h31" stroke="#22d3ee" stroke-width="6"/>
      <path d="M55 171h145" stroke="#64748b" stroke-width="4" stroke-dasharray="9 8"/>
      <circle cx="62" cy="171" r="7" fill="#f472b6" stroke="none">
        <animate attributeName="cx" values="62;193;62" dur="4.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">An agent without readable history</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">has amnesia.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Searchable files, transcripts, and activity logs let past work compound.</text>
    </g>
  </g>

  <!-- Different habits -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="24s" repeatCount="indefinite"/>
    <g transform="translate(77 75)" font-family="ui-monospace, monospace">
      <rect x="5" y="8" width="215" height="178" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
      <text x="25" y="42" fill="#94a3b8" font-size="14">SAME SKILL: code</text>
      <text x="25" y="83" fill="#f8fafc" font-size="19">CLAUDE</text>
      <rect x="112" y="65" width="12" height="24" rx="6" fill="#8b5cf6"/>
      <text x="138" y="84" fill="#cbd5e1" font-size="17">6.1%</text>
      <text x="25" y="128" fill="#f8fafc" font-size="19">CODEX</text>
      <rect x="112" y="109" width="79" height="24" rx="6" fill="url(#neon)"/>
      <text x="25" y="169" fill="#f472b6" font-size="15">DIFFERENT HABITS</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Same instructions.</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">Different habits.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Identical skill files can shape different models in very different ways.</text>
    </g>
  </g>

  <!-- Roles -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="32s" repeatCount="indefinite"/>
    <g transform="translate(77 78)" font-family="ui-monospace, monospace">
      <rect x="4" y="8" width="220" height="166" rx="22" fill="#0f172a" stroke="#f472b6" stroke-width="3"/>
      <text x="25" y="54" fill="#f472b6" font-size="20" font-weight="800">User:</text>
      <text x="25" y="91" fill="#f8fafc" font-size="16">ignore the source</text>
      <path d="M24 112h174" stroke="#64748b" stroke-width="3" stroke-dasharray="7 6"/>
      <path d="M68 139h91" stroke="#22d3ee" stroke-width="7"/>
      <path d="M168 128l20 11-20 11" fill="none" stroke="#22d3ee" stroke-width="5"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Models can confuse</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">who said what.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">A role label can make untrusted text feel like a direct instruction.</text>
    </g>
  </g>

  <!-- Interface -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="40s" repeatCount="indefinite"/>
    <g transform="translate(86 66)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="26" y="4" width="126" height="205" rx="22" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/>
      <rect x="41" y="32" width="96" height="132" rx="11" fill="#071326" stroke="#334155"/>
      <path d="M55 58h68M55 82h47M55 106h61" stroke="#22d3ee" stroke-width="5"/>
      <path d="M55 139h30" stroke="#f472b6" stroke-width="5"/>
      <circle cx="89" cy="187" r="8" stroke="#64748b" stroke-width="3"/>
      <path d="M172 65h47M172 92h31M172 119h47M172 146h23" stroke="#64748b" stroke-width="5"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">The interface can change</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">the answer.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Device, permissions, memory, and tool access become behavioural context.</text>
    </g>
  </g>

  <!-- Verification -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="48s" repeatCount="indefinite"/>
    <g transform="translate(82 73)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M109 6l82 31v58c0 50-33 76-82 96-49-20-82-46-82-96V37z" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
      <path d="M64 96l31 31 59-68" stroke="#8b5cf6" stroke-width="10"/>
      <circle cx="173" cy="54" r="25" fill="#2a0d2a" stroke="#f472b6" stroke-width="3"/>
      <text x="173" y="62" text-anchor="middle" fill="#f472b6" font-family="ui-monospace, monospace" font-size="22" font-weight="800">?</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Confident prose is</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">not verification.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Let agents run code, tests, and formal checks when correctness matters.</text>
    </g>
  </g>

  <!-- Post-mortem -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.015625;.109375;.125;1" dur="64s" begin="56s" repeatCount="indefinite"/>
    <g transform="translate(80 72)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M44 33h138a24 24 0 0 1 24 24v110a24 24 0 0 1-24 24H44a24 24 0 0 1-24-24V57a24 24 0 0 1 24-24z" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/>
      <path d="M53 76h64M53 111h105M53 146h82" stroke="#64748b" stroke-width="6"/>
      <path d="M159 130a38 38 0 1 1 0-54" stroke="#22d3ee" stroke-width="7"/>
      <path d="M159 62l4 27-27-5" stroke="#22d3ee" stroke-width="7"/>
      <circle cx="153" cy="113" r="8" fill="#f472b6" stroke="none" filter="url(#glow)"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="372" y="125" fill="#f8fafc" font-size="35" font-weight="800">Every failure should</text>
      <text x="372" y="169" fill="url(#neon)" font-size="35" font-weight="800">update the system.</text>
      <text x="372" y="218" fill="#cbd5e1" font-size="18">Fix the prompt, skill, tool, or environment—not only the last answer.</text>
    </g>
  </g>

  <rect x="48" y="313" width="1104" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="48" y="313" width="0" height="3" rx="1.5" fill="url(#neon)" filter="url(#glow)">
    <animate attributeName="width" values="0;1104" dur="64s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="1198" height="338" rx="25" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="2"/>
</svg>